<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" rx="20" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="700" cy="300" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="650" cy="80" r="50" fill="rgba(255,255,255,0.08)"/>
  
  <!-- DNA/Health Icon -->
  <text x="400" y="120" text-anchor="middle" font-size="80" filter="url(#shadow)">🧬</text>
  
  <!-- Main Title -->
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" filter="url(#shadow)">
    EthioHealth AI Pro
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.9)">
    Ethiopia's Most Advanced AI Health Platform
  </text>
  
  <!-- Amharic Subtitle -->
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">
    የኢትዮጵያ እጅግ የላቀ AI የጤና መድረክ
  </text>
  
  <!-- Bottom line -->
  <line x1="200" y1="330" x2="600" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Bottom badges -->
  <rect x="220" y="345" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="270" y="365" text-anchor="middle" font-size="12" fill="white" font-weight="bold">🤖 Groq AI</text>
  
  <rect x="340" y="345" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="390" y="365" text-anchor="middle" font-size="12" fill="white" font-weight="bold">📚 PubMed</text>
  
  <rect x="460" y="345" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="510" y="365" text-anchor="middle" font-size="12" fill="white" font-weight="bold">🇪🇹 Ethiopian</text>
</svg>
