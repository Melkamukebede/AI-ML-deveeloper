<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <style>
    [data-part] { fill: #e5e7eb; stroke: #d1d5db; stroke-width: 2; cursor: pointer; transition: fill 0.2s; }
    [data-part]:hover { fill: #d1fae5; stroke: #10b981; }
    [data-part].selected { fill: #10b981; stroke: #059669; }
  </style>
  
  <!-- Head -->
  <circle cx="100" cy="40" r="30" data-part="head"/>
  
  <!-- Neck -->
  <rect x="85" y="70" width="30" height="20" rx="5" data-part="neck"/>
  
  <!-- Chest -->
  <rect x="60" y="90" width="80" height="100" rx="15" data-part="chest"/>
  
  <!-- Abdomen -->
  <rect x="65" y="195" width="70" height="70" rx="12" data-part="abdomen"/>
  
  <!-- Left Arm -->
  <rect x="20" y="95" width="35" height="25" rx="10" data-part="left_arm_upper"/>
  <rect x="15" y="125" width="30" height="60" rx="8" data-part="left_arm_lower"/>
  
  <!-- Right Arm -->
  <rect x="145" y="95" width="35" height="25" rx="10" data-part="right_arm_upper"/>
  <rect x="155" y="125" width="30" height="60" rx="8" data-part="right_arm_lower"/>
  
  <!-- Left Leg -->
  <rect x="55" y="270" width="35" height="70" rx="10" data-part="left_leg_upper"/>
  <rect x="55" y="345" width="35" height="40" rx="8" data-part="left_leg_lower"/>
  
  <!-- Right Leg -->
  <rect x="110" y="270" width="35" height="70" rx="10" data-part="right_leg_upper"/>
  <rect x="110" y="345" width="35" height="40" rx="8" data-part="right_leg_lower"/>
  
  <!-- Hands -->
  <circle cx="10" cy="190" r="12" data-part="left_hand"/>
  <circle cx="190" cy="190" r="12" data-part="right_hand"/>
  
  <!-- Feet -->
  <ellipse cx="72" cy="395" rx="20" ry="10" data-part="left_foot"/>
  <ellipse cx="128" cy="395" rx="20" ry="10" data-part="right_foot"/>
</svg>